name: Live platform integration check

on:
  pull_request:
    paths:
      - '.github/workflows/live-platform-pr-check.yml'
      - 'deployment/live-check-trigger.txt'

permissions:
  contents: read

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Compare deployed and nonexistent workers.dev hosts
        shell: bash
        run: |
          set -u
          HOST="pedidos-pro-platform.botreservasmultilocal.workers.dev"
          RANDOM_HOST="pedidos-pro-does-not-exist-7261.botreservasmultilocal.workers.dev"

          probe() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --max-time 30 \
              --output "/tmp/${label}.body" --write-out '%{http_code}' "$url" || echo CURL_ERROR)
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 500 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }

          echo "TARGET_DNS=$(getent ahostsv4 "$HOST" | head -1 || true)"
          echo "RANDOM_DNS=$(getent ahostsv4 "$RANDOM_HOST" | head -1 || true)"
          probe APP "https://${HOST}/"
          probe HEALTH "https://${HOST}/health"
          probe RANDOM "https://${RANDOM_HOST}/"

          app_code=$(curl --silent --show-error --location --max-time 30 \
            --output /tmp/final-app.body --write-out '%{http_code}' "https://${HOST}/" || true)
          health_code=$(curl --silent --show-error --location --max-time 30 \
            --output /tmp/final-health.body --write-out '%{http_code}' "https://${HOST}/health" || true)
          test "$app_code" = "200"
          grep -q 'Pedidos Pro Platform' /tmp/final-app.body
          test "$health_code" = "200"
          grep -q '"ok":true' /tmp/final-health.body
          grep -q '"databaseInitialized":true' /tmp/final-health.body
