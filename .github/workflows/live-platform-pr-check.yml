name: Live platform integration check

on:
  pull_request:
    paths:
      - '.github/workflows/live-platform-pr-check.yml'
      - 'deployment/live-check-trigger.txt'

permissions:
  contents: read

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect DNS, TLS, application shell and health
        shell: bash
        run: |
          set -euo pipefail
          HOST="pedidos-pro-platform.botreservasmultilocal.workers.dev"
          APP_URL="https://${HOST}/"
          HEALTH_URL="https://${HOST}/health"

          echo "### DNS"
          getent hosts "$HOST" || true

          echo "### Application shell headers"
          curl --verbose --location --max-time 30 "$APP_URL" --output /tmp/app.html
          grep -q 'Pedidos Pro Platform' /tmp/app.html

          echo "### Health retries"
          for attempt in $(seq 1 12); do
            echo "attempt=${attempt}"
            if curl --fail --silent --show-error --max-time 30 "$HEALTH_URL" --output /tmp/health.json; then
              cat /tmp/health.json
              grep -q '"ok":true' /tmp/health.json
              grep -q '"service":"pedidos-pro-platform"' /tmp/health.json
              grep -q '"databaseInitialized":true' /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          exit 1
