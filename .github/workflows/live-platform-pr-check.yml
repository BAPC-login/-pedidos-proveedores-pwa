name: Live platform integration check

on:
  pull_request:
    paths:
      - '.github/workflows/live-platform-pr-check.yml'
      - 'deployment/live-check-trigger.txt'

permissions:
  contents: read

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect target and existing Cloudflare Worker
        shell: bash
        run: |
          set -u
          TARGET="pedidos-pro-platform.botreservasmultilocal.workers.dev"
          EXISTING="pedidos-pro-ai.botreservasmultilocal.workers.dev"
          RANDOM_HOST="pedidos-pro-does-not-exist-7261.botreservasmultilocal.workers.dev"

          probe() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --max-time 30 \
              --output "/tmp/${label}.body" --write-out '%{http_code}' "$url" || echo CURL_ERROR)
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 1200 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }

          probe TARGET_ROOT "https://${TARGET}/"
          probe TARGET_HEALTH "https://${TARGET}/health"
          probe EXISTING_ROOT "https://${EXISTING}/"
          probe EXISTING_HEALTH "https://${EXISTING}/health"
          probe EXISTING_AI "https://${EXISTING}/v1/models"
          probe RANDOM "https://${RANDOM_HOST}/"

          exit 1
