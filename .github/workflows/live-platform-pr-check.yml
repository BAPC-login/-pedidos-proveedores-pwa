name: Live platform integration check

on:
  pull_request:
    paths:
      - '.github/workflows/live-platform-pr-check.yml'
      - 'deployment/live-check-trigger.txt'

permissions:
  contents: read

jobs:
  check-live:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect public responses
        shell: bash
        run: |
          set -u
          HOST="pedidos-pro-platform.botreservasmultilocal.workers.dev"
          APP_URL="https://${HOST}/"
          HEALTH_URL="https://${HOST}/health"

          echo "DNS=$(getent ahostsv4 "$HOST" | head -1 || true)"

          app_code=$(curl --silent --show-error --location --max-time 30 \
            --dump-header /tmp/app.headers --output /tmp/app.body \
            --write-out '%{http_code}' "$APP_URL" || echo CURL_ERROR)
          echo "APP_HTTP=${app_code}"
          sed -n '1,20p' /tmp/app.headers 2>/dev/null || true
          echo "APP_BODY_BEGIN"
          head -c 1200 /tmp/app.body 2>/dev/null || true
          echo
          echo "APP_BODY_END"

          health_code=$(curl --silent --show-error --location --max-time 30 \
            --dump-header /tmp/health.headers --output /tmp/health.body \
            --write-out '%{http_code}' "$HEALTH_URL" || echo CURL_ERROR)
          echo "HEALTH_HTTP=${health_code}"
          sed -n '1,20p' /tmp/health.headers 2>/dev/null || true
          echo "HEALTH_BODY_BEGIN"
          head -c 2000 /tmp/health.body 2>/dev/null || true
          echo
          echo "HEALTH_BODY_END"

          test "$app_code" = "200"
          grep -q 'Pedidos Pro Platform' /tmp/app.body
          test "$health_code" = "200"
          grep -q '"ok":true' /tmp/health.body
          grep -q '"databaseInitialized":true' /tmp/health.body
