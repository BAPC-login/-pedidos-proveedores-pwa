name: Apply master list and free-item AI pass

on:
  push:
    branches:
      - agent/master-list-ordering-free-items
    paths:
      - tools/apply-master-free-ai.mjs
      - .github/workflows/apply-master-free-ai.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/master-list-ordering-free-items
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply AI document patch
        run: node tools/apply-master-free-ai.mjs
      - name: Verify professional platform
        working-directory: professional
        run: npm run verify
      - name: Verify Cloudflare bundle
        working-directory: worker
        run: |
          npm install
          npx wrangler deploy --dry-run
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm tools/apply-master-free-ai.mjs .github/workflows/apply-master-free-ai.yml
          git add -A
          git commit -m "feat: classify documents and recognize free invoice lines"
          git push origin HEAD:agent/master-list-ordering-free-items
