name: Apply professional rebuild

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'tools/apply-professional-rebuild.mjs'
      - 'tools/professional-rebuild-chunks/**'
      - '.github/workflows/apply-professional-rebuild.yml'
  push:
    branches: [main]
    paths:
      - 'tools/apply-professional-rebuild.mjs'
      - 'tools/professional-rebuild-chunks/**'
      - '.github/workflows/apply-professional-rebuild.yml'

permissions:
  contents: write

concurrency:
  group: professional-rebuild-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-verify-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Apply professional release
        run: node tools/apply-professional-rebuild.mjs
      - name: Verify source and tests
        working-directory: professional
        run: npm run verify
      - name: Verify rebuilt modules
        run: |
          node --check professional/worker/src/legacyCatalog.js
          node --check professional/worker/src/schema.js
          node --check professional/worker/src/index-scoped.js
          node --check professional/web/app-core.js
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app.js
          node --check professional/web/sw.js
          node --check worker/src/combined.js
          grep -q "SCHEMA_VERSION = '9'" professional/worker/src/schema.js
          grep -q "LEGACY_CATALOG_SIZE = LEGACY_ITEMS.length" professional/worker/src/legacyCatalog.js
          grep -q "openWorkspaceSwitcher" professional/web/app-actions.js
          grep -q "data-modal-close" professional/web/index.html
          grep -q "catalogReady" professional/worker/src/index-scoped.js
          grep -q "2026.07.22.21" worker/src/combined.js
      - name: Bundle Cloudflare worker
        working-directory: worker
        run: npx --yes wrangler@4.67.0 deploy --dry-run --outdir /tmp/pedidos-pro-professional-release
      - name: Commit generated release
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git rm -r tools/apply-professional-rebuild.mjs tools/professional-rebuild-chunks .github/workflows/apply-professional-rebuild.yml
          git add -A
          git commit -m "feat: restore catalog and professionalize operations"
          git push origin main
