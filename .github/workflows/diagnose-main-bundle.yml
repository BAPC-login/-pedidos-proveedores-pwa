name: Diagnose main bundle

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-main-bundle.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture validation and Wrangler output
        shell: bash
        run: |
          set +e
          mkdir -p deployment
          {
            echo "checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "commit=$GITHUB_SHA"
            echo "schema_fix=2b6494cde437653041f0e3bc567d5d5b5bfbac60"
            echo "--- professional verify ---"
            (cd professional && npm run verify)
            verify_status=$?
            echo "verify_status=$verify_status"
            echo "--- wrangler dry run ---"
            (cd worker && npx --yes wrangler@4.67.0 deploy --dry-run --outdir ../deployment/current-release-bundle)
            wrangler_status=$?
            echo "wrangler_status=$wrangler_status"
          } > deployment/bundle-diagnostic.txt 2>&1
          tail -n 200 deployment/bundle-diagnostic.txt
      - name: Publish diagnostic
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/bundle-diagnostic.txt
          git commit -m "chore(ci): record main bundle diagnostic [skip ci]" || exit 0
          git push
