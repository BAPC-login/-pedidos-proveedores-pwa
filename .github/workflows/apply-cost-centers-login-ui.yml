name: Validate final cost centers release

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'tools/validate-cost-centers-final.txt'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Run platform tests
        working-directory: professional
        run: npm run verify
      - name: Validate release sources
        run: |
          node --check professional/worker/src/schema.js
          node --check professional/worker/src/auth.js
          node --check professional/worker/src/api/catalog.js
          node --check professional/worker/src/api/orders.js
          node --check professional/worker/src/index.js
          node --check professional/worker/src/platform.js
          node --check professional/worker/src/storage.js
          node --check professional/web/app-core.js
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app-order-detail.js
          node --check professional/web/app.js
          node --check worker/src/combined.js
          grep -q "SCHEMA_VERSION = '8'" professional/worker/src/schema.js
          grep -q "Madriguera Clubhaus" professional/migrations/0005_cost_centers.sql
          grep -q "'Barra', 'BARRA'" professional/migrations/0005_cost_centers.sql
          grep -q "'Salón', 'SALON'" professional/migrations/0005_cost_centers.sql
          grep -q "'Cocina', 'COCINA'" professional/migrations/0005_cost_centers.sql
          grep -q "costCenterId" professional/web/app-actions.js
          grep -q "new-cost-center" professional/web/app-views.js
          grep -q "isPlatformOwner" professional/web/app-core.js
          ! grep -q "loginOrg" professional/web/index.html
          ! grep -q "loginOrg" professional/web/app.js
          ! grep -q "freeUsageText\|freeUsageBar" professional/web/app-core.js
          ! test -e tools/apply-cost-centers-login-ui.mjs
          ! test -e tools/fix-cost-centers-applicator.mjs
          ! test -e tools/apply-cost-centers-error.txt
      - name: Bundle exact Cloudflare worker
        working-directory: worker
        run: npx --yes wrangler@4.67.0 deploy --dry-run --outdir /tmp/pedidos-pro-cost-centers-final
