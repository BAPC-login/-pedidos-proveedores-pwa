name: Apply cost centers and login UI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'tools/run-cost-centers-trigger.txt'

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply requested release
        shell: bash
        run: |
          set +e
          node tools/apply-cost-centers-login-ui.mjs > /tmp/apply.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 60 /tmp/apply.log > tools/apply-cost-centers-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
            git add tools/apply-cost-centers-error.txt
            git commit -m "chore(ci): record cost centers applicator error" || true
            git push origin HEAD:${{ github.head_ref }} || true
          fi
          tail -n 60 /tmp/apply.log
          exit $status
      - name: Verify platform
        working-directory: professional
        run: npm run verify
      - name: Verify modified modules
        run: |
          node --check professional/worker/src/schema.js
          node --check professional/worker/src/api/catalog.js
          node --check professional/worker/src/api/orders.js
          node --check professional/worker/src/index.js
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app.js
          grep -q "SCHEMA_VERSION = '8'" professional/worker/src/schema.js
          grep -q "Madriguera Clubhaus" professional/migrations/0005_cost_centers.sql
          grep -q "storageBackend" professional/worker/src/index.js
      - name: Bundle Cloudflare Worker
        working-directory: worker
        run: npx --yes wrangler@4.67.0 deploy --dry-run --outdir ../deployment/cost-centers-release
      - name: Commit generated release to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          rm -f tools/apply-cost-centers-error.txt
          git add -A
          git commit -m "feat: Madriguera cost centers and direct login"
          git push origin HEAD:${{ github.head_ref }}
