name: Verify live Pedidos Pro Platform

on:
  push:
    branches: [main]
    paths:
      - 'professional/**'
      - 'wrangler.jsonc'
      - '.github/workflows/verify-live-platform.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-live-platform
  cancel-in-progress: true

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare deployment and verify health
        shell: bash
        run: |
          set -euo pipefail
          URL="https://pedidos-pro-platform.botreservasmultilocal.workers.dev/health"
          for attempt in $(seq 1 36); do
            echo "Health check attempt ${attempt}/36"
            if response=$(curl --fail --silent --show-error --max-time 20 "$URL"); then
              echo "$response"
              echo "$response" | grep -q '"ok":true'
              echo "$response" | grep -q '"databaseInitialized":true'
              echo "$response" | grep -q '"service":"pedidos-pro-platform"'
              exit 0
            fi
            sleep 10
          done
          echo "Platform did not become healthy within six minutes"
          exit 1
      - name: Verify application shell
        run: |
          curl --fail --silent --show-error --max-time 20 \
            https://pedidos-pro-platform.botreservasmultilocal.workers.dev/ \
            | grep -q 'Pedidos Pro Platform'
