name: Verify live Pedidos Pro Platform

on:
  push:
    branches: [main]
    paths:
      - 'professional/**'
      - 'worker/**'
      - '.github/workflows/verify-live-platform.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-live-platform
  cancel-in-progress: true

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Cloudflare and verify professional production
        shell: bash
        run: |
          set -u
          BASE_URL="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
          status="failed"
          app_ok="false"
          ai_health=""
          platform_health=""
          release_header=""

          for attempt in $(seq 1 48); do
            echo "Production verification attempt ${attempt}/48"
            app=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/" 2>/dev/null || true)
            ai_health=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/health" 2>/dev/null || true)
            platform_health=$(curl --fail --silent --show-error --max-time 20 --dump-header /tmp/platform.headers "$BASE_URL/platform/health" 2>/dev/null || true)
            app_order_core=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-order-core-v13.js" 2>/dev/null || true)
            app_procurement=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-procurement-settings.js" 2>/dev/null || true)
            app_admin=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-experience-admin.js" 2>/dev/null || true)
            app_router=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-router-v14.js" 2>/dev/null || true)
            app_dashboard=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-dashboard-v14.js" 2>/dev/null || true)
            app_keyboard=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-experience-keyboard.js" 2>/dev/null || true)
            app_files=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-file-actions.js" 2>/dev/null || true)
            design_css=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/design-system-v14.css" 2>/dev/null || true)
            release_header=$(grep -i '^x-pedidos-pro-release:' /tmp/platform.headers 2>/dev/null | tr -d '\r' | awk '{print $2}' || true)

            if echo "$app" | grep -q '<title>Pedidos Pro</title>' \
              && echo "$app" | grep -q 'id="routeBack"' \
              && echo "$app" | grep -q 'design-system-v14.css' \
              && echo "$app_order_core" | grep -q 'Todos excepto…' \
              && echo "$app_order_core" | grep -q 'data-exception-supplier' \
              && ! echo "$app_order_core" | grep -q 'data-enter-next' \
              && echo "$app_procurement" | grep -q 'Este es el orden que verá la lista maestra' \
              && echo "$app_procurement" | grep -q 'namesForCenter' \
              && echo "$app_admin" | grep -q 'Centro de costo obligatorio' \
              && echo "$app_admin" | grep -q 'Entra a un menú, trabaja y vuelve exactamente al punto anterior' \
              && echo "$app_router" | grep -q 'popstate' \
              && echo "$app_router" | grep -q 'sessionStorage' \
              && echo "$app_dashboard" | grep -q 'line-chart' \
              && echo "$app_dashboard" | grep -q 'donut' \
              && echo "$app_dashboard" | grep -q 'vertical-bars' \
              && echo "$app_keyboard" | grep -q 'Enter / siguiente' \
              && echo "$app_files" | grep -q 'document-preview-loading' \
              && echo "$design_css" | grep -q 'route-back' \
              && echo "$design_css" | grep -q 'operations-home-grid' \
              && echo "$ai_health" | grep -q '"service":"pedidos-pro-ai"' \
              && echo "$ai_health" | grep -q '"geminiConfigured":true' \
              && echo "$platform_health" | grep -q '"service":"pedidos-pro-platform"' \
              && echo "$platform_health" | grep -q '"version":"2.0.0-alpha.14"' \
              && echo "$platform_health" | grep -q '"databaseInitialized":true' \
              && echo "$platform_health" | grep -q '"schemaVersion":"14"' \
              && echo "$platform_health" | grep -q '"catalogReady":true' \
              && echo "$platform_health" | grep -q '"categoryCostCenters":true' \
              && echo "$platform_health" | grep -q '"deliveryDateExceptions":true' \
              && echo "$platform_health" | grep -q '"fastNavigation":true' \
              && echo "$platform_health" | grep -q '"restoredScroll":true' \
              && echo "$platform_health" | grep -q '"professionalDashboard":true' \
              && [ "$release_header" = "2026.07.23.04" ]; then
              app_ok="true"
              status="healthy"
              break
            fi
            sleep 10
          done

          me_status=$(curl --silent --show-error --max-time 20 --output /tmp/me.json --write-out '%{http_code}' "$BASE_URL/api/me" || true)
          login_status=$(curl --silent --show-error --max-time 20 --output /tmp/login.json --write-out '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"admin@pedidospro.local","password":"incorrecta"}' "$BASE_URL/api/auth/login" || true)
          bootstrap_status=$(curl --silent --show-error --max-time 20 --output /tmp/bootstrap.json --write-out '%{http_code}' -H 'Content-Type: application/json' --data '{"organizationName":"Unauthorized","locationName":"Unauthorized","displayName":"Unauthorized","email":"unauthorized@example.com","password":"unauthorized-password"}' "$BASE_URL/api/bootstrap" || true)
          if [ "$me_status" != "401" ] || [ "$login_status" != "401" ] || [ "$bootstrap_status" != "403" ]; then status="failed"; fi

          mkdir -p deployment
          STATUS="$status" APP_OK="$app_ok" AI_HEALTH="$ai_health" PLATFORM_HEALTH="$platform_health" RELEASE_HEADER="$release_header" ME_STATUS="$me_status" LOGIN_STATUS="$login_status" BOOTSTRAP_STATUS="$bootstrap_status" python - <<'PY'
          import datetime, json, os
          def load(name):
              raw=os.environ.get(name,'')
              try:return json.loads(raw) if raw else None
              except json.JSONDecodeError:return {'raw':raw[:1000]}
          payload={
            'status':os.environ.get('STATUS','failed'),
            'application_shell':os.environ.get('APP_OK')=='true',
            'checked_at':datetime.datetime.now(datetime.timezone.utc).isoformat(),
            'url':'https://pedidos-pro-ai.botreservasmultilocal.workers.dev/',
            'release':os.environ.get('RELEASE_HEADER',''),
            'ai_health':load('AI_HEALTH'),
            'platform_health':load('PLATFORM_HEALTH'),
            'security_checks':{
              'unauthenticated_me_http':int(os.environ.get('ME_STATUS') or 0),
              'invalid_login_http':int(os.environ.get('LOGIN_STATUS') or 0),
              'bootstrap_without_token_http':int(os.environ.get('BOOTSTRAP_STATUS') or 0),
            }
          }
          with open('deployment/live-health.json','w',encoding='utf-8') as f:json.dump(payload,f,ensure_ascii=False,indent=2);f.write('\n')
          PY
          cat deployment/live-health.json
          test "$status" = "healthy"
      - name: Publish health verification result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment/live-health.json
          git commit -m "chore(deploy): record professional catalog health [skip ci]" || exit 0
          git push
