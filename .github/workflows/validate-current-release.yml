name: Validate current release

on:
  pull_request:
    paths:
      - '.github/workflows/validate-current-release.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate professional platform
        working-directory: professional
        run: npm run verify
      - name: Validate final worker sources
        run: |
          node --check professional/worker/src/storage.js
          node --check professional/worker/src/index.js
          node --check professional/web/app-views.js
          node --check worker/src/combined.js
      - name: Bundle exact Cloudflare worker
        working-directory: worker
        shell: bash
        run: |
          set +e
          npm ci > /tmp/npm-ci.log 2>&1
          npm_status=$?
          echo "NPM_CI_STATUS=$npm_status"
          tail -n 80 /tmp/npm-ci.log
          if [ "$npm_status" -ne 0 ]; then exit "$npm_status"; fi
          npx wrangler deploy --dry-run --outdir ../deployment/current-release-bundle > /tmp/wrangler.log 2>&1
          wrangler_status=$?
          echo "WRANGLER_STATUS=$wrangler_status"
          tail -n 120 /tmp/wrangler.log
          exit "$wrangler_status"
