name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  validate-combined:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Bundle and inspect combined Worker
        shell: bash
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' \
            "/repos/BAPC-login/-pedidos-proveedores-pwa/tarball/${{ github.sha }}" \
            > /tmp/repo.tar.gz
          mkdir /tmp/repo
          tar -xzf /tmp/repo.tar.gz -C /tmp/repo --strip-components=1
          cd /tmp/repo/worker
          npm install --no-audit --no-fund --silent
          npx wrangler deploy --dry-run --outdir /tmp/combined-worker > /tmp/dryrun.log 2>&1
          echo "BUNDLE_OK=true"
          tail -20 /tmp/dryrun.log

          probe() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --max-time 30 \
              --output "/tmp/${label}.body" --write-out '%{http_code}' "$url" || echo CURL_ERROR)
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 1600 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }
          probe APP "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/"
          probe AI_HEALTH "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/health"
          probe PLATFORM_HEALTH "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/platform/health"
