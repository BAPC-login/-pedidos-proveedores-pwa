name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: write

jobs:
  patch-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Switch authentication to native PBKDF2 module
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('professional/worker/src/auth.js')
          text = path.read_text(encoding='utf-8')
          original = text
          text = text.replace('  hashPassword,\n', '')
          text = text.replace('  uuid,\n  verifyPassword\n', '  uuid\n')
          marker = "} from './core.js';\n"
          import_line = "import {hashPassword, verifyPassword} from './password.js';\n"
          if import_line not in text:
              text = text.replace(marker, marker + import_line, 1)
          if text == original:
              raise SystemExit('Authentication import was not changed')
          path.write_text(text, encoding='utf-8')
          PY
          node --check professional/worker/src/auth.js
          node --check professional/worker/src/password.js
      - name: Commit authentication compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add professional/worker/src/auth.js professional/worker/src/password.js
          git commit -m "fix(auth): use native PBKDF2 in Cloudflare Workers"
          git push origin HEAD:main
