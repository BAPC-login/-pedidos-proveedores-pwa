name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify new platform and preserved AI Worker
        shell: bash
        run: |
          set -euo pipefail
          probe() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --max-time 30 \
              --output "/tmp/${label}.body" --write-out '%{http_code}' "$url" || echo CURL_ERROR)
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 1600 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }
          probe PLATFORM_ROOT "https://pedidos-pro-platform.botreservasmultilocal.workers.dev/"
          probe PLATFORM_HEALTH "https://pedidos-pro-platform.botreservasmultilocal.workers.dev/health"
          probe AI_HEALTH "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/health"

          grep -q 'Pedidos Pro Platform' /tmp/PLATFORM_ROOT.body
          grep -q '"ok":true' /tmp/PLATFORM_HEALTH.body
          grep -q '"databaseInitialized":true' /tmp/PLATFORM_HEALTH.body
          grep -q '"service":"pedidos-pro-ai"' /tmp/AI_HEALTH.body
