name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  inspect-production:
    runs-on: ubuntu-latest
    steps:
      - name: Print current production state
        shell: bash
        run: |
          set -u
          BASE="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
          probe() {
            label="$1"
            method="$2"
            path="$3"
            body="${4:-}"
            if [ "$method" = "POST" ]; then
              code=$(curl --silent --show-error --max-time 30 --output "/tmp/${label}.body" --write-out '%{http_code}' \
                -H 'Content-Type: application/json' --data "$body" "$BASE$path" || true)
            else
              code=$(curl --silent --show-error --max-time 30 --output "/tmp/${label}.body" --write-out '%{http_code}' "$BASE$path" || true)
            fi
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 1000 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }
          probe APP GET /
          probe APP_JS GET /app.js
          probe AI GET /health
          probe PLATFORM GET /platform/health
          probe ME GET /api/me
          probe LOGIN POST /api/auth/login '{"email":"admin@pedidospro.local","password":"contraseña-incorrecta","organizationSlug":"pedidos-pro"}'
          probe BOOTSTRAP POST /api/bootstrap '{"organizationName":"Blocked","locationName":"Blocked","displayName":"Blocked","email":"blocked@example.com","password":"blocked-password"}'
          probe DIAGNOSTICS GET /api/platform-diagnostics
