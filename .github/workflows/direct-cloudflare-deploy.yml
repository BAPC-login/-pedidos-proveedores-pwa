name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Confirm Cloudflare credential availability
        shell: bash
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN is not configured in GitHub Actions"
            exit 1
          fi
          echo "Cloudflare API token is configured"
      - name: Deploy production Worker and provision D1
        run: npx wrangler deploy --yes
      - name: Verify deployed platform
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://pedidos-pro-platform.botreservasmultilocal.workers.dev/health \
            | tee /tmp/health.json
          grep -q '"ok":true' /tmp/health.json
          grep -q '"databaseInitialized":true' /tmp/health.json
