name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate connected Worker source
        shell: bash
        run: |
          echo "### Repository files"
          find . -maxdepth 4 -type f \
            ! -path './.git/*' \
            | sort \
            | sed -n '1,500p'
          echo "### Worker signatures"
          grep -RIn --exclude-dir=.git --exclude='*.map' \
            -E 'catalog-v22|gemini-3\.5-flash|v1/invoices/analyze|geminiConfigured' . \
            | head -200 || true
