name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect target and existing Cloudflare Worker
        shell: bash
        run: |
          set -u
          probe() {
            label="$1"
            url="$2"
            code=$(curl --silent --show-error --location --max-time 30 \
              --output "/tmp/${label}.body" --write-out '%{http_code}' "$url" || echo CURL_ERROR)
            echo "${label}_HTTP=${code}"
            printf '%s_BODY=' "$label"
            head -c 1600 "/tmp/${label}.body" 2>/dev/null || true
            echo
          }
          probe TARGET_ROOT "https://pedidos-pro-platform.botreservasmultilocal.workers.dev/"
          probe TARGET_HEALTH "https://pedidos-pro-platform.botreservasmultilocal.workers.dev/health"
          probe EXISTING_ROOT "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/"
          probe EXISTING_HEALTH "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/health"
          probe EXISTING_ANALYZE "https://pedidos-pro-ai.botreservasmultilocal.workers.dev/v1/invoices/analyze"
          exit 1
