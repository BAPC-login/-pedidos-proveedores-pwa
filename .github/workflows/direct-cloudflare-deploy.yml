name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  inspect-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Print current R2 state
        shell: bash
        run: |
          set -u
          BASE="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
          health_code=$(curl --silent --show-error --max-time 30 --dump-header /tmp/health.headers --output /tmp/health.json --write-out '%{http_code}' "$BASE/platform/health" || true)
          storage_code=$(curl --silent --show-error --max-time 60 --output /tmp/storage.json --write-out '%{http_code}' \
            -X POST "$BASE/api/platform-storage-selftest" || true)
          echo "HEALTH_HTTP=$health_code"
          cat /tmp/health.headers 2>/dev/null || true
          cat /tmp/health.json 2>/dev/null || true
          echo
          echo "STORAGE_HTTP=$storage_code"
          cat /tmp/storage.json 2>/dev/null || true
          echo
