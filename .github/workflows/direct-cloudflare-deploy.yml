name: Direct Cloudflare deploy

on:
  pull_request:
    paths:
      - '.github/workflows/direct-cloudflare-deploy.yml'

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PWA, Gemini and D1
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"

          app_code=$(curl --silent --show-error --max-time 30 --output /tmp/app.html --write-out '%{http_code}' "$BASE/")
          ai_code=$(curl --silent --show-error --max-time 30 --output /tmp/ai.json --write-out '%{http_code}' "$BASE/health")
          platform_code=$(curl --silent --show-error --max-time 30 --output /tmp/platform.json --write-out '%{http_code}' "$BASE/platform/health")

          echo "APP_HTTP=$app_code"
          echo "AI_HTTP=$ai_code"
          cat /tmp/ai.json
          echo
          echo "PLATFORM_HTTP=$platform_code"
          cat /tmp/platform.json
          echo

          test "$app_code" = "200"
          grep -q 'Pedidos Pro Platform' /tmp/app.html
          test "$ai_code" = "200"
          grep -q '"service":"pedidos-pro-ai"' /tmp/ai.json
          grep -q '"geminiConfigured":true' /tmp/ai.json
          test "$platform_code" = "200"
          grep -q '"service":"pedidos-pro-platform"' /tmp/platform.json
          grep -q '"databaseInitialized":true' /tmp/platform.json
