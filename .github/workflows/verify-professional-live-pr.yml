name: Verify professional live PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/verify-professional-live-pr.yml'
      - 'tools/verify-professional-live-trigger.txt'

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify public release, catalog and mobile assets
        shell: bash
        run: |
          set -u
          BASE_URL="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
          for attempt in $(seq 1 30); do
            echo "attempt=${attempt}"
            app=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/" 2>/dev/null || true)
            actions=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-actions.js" 2>/dev/null || true)
            views=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/app-views.js" 2>/dev/null || true)
            index=$(curl --fail --silent --show-error --max-time 20 "$BASE_URL/index.html" 2>/dev/null || true)
            health=$(curl --fail --silent --show-error --max-time 20 --dump-header /tmp/headers "$BASE_URL/platform/health" 2>/dev/null || true)
            release=$(grep -i '^x-pedidos-pro-release:' /tmp/headers 2>/dev/null | tr -d '\r' | awk '{print $2}' || true)
            if HEALTH="$health" RELEASE="$release" APP="$app" ACTIONS="$actions" VIEWS="$views" INDEX="$index" python - <<'PY'
          import json, os, sys
          try:
              h=json.loads(os.environ.get('HEALTH',''))
          except Exception:
              print('health response is not valid JSON')
              sys.exit(1)
          checks={
            'release': os.environ.get('RELEASE')=='2026.07.22.21',
            'service': h.get('service')=='pedidos-pro-platform',
            'schema': str(h.get('schemaVersion'))=='9',
            'catalog_ready': h.get('catalogReady') is True,
            'products': int(h.get('catalogProducts',0))>=193,
            'suppliers': int(h.get('catalogSuppliers',0))>=12,
            'purchase_formats': int(h.get('catalogPurchaseFormats',0))>=194,
            'owner': h.get('platformOwnerReady') is True,
            'locations': int(h.get('activeLocations',0))>=1,
            'app_shell': 'Pedidos Pro Platform' in os.environ.get('APP',''),
            'workspace_switcher': 'openWorkspaceSwitcher' in os.environ.get('ACTIONS',''),
            'create_user': 'Crear usuario' in os.environ.get('ACTIONS',''),
            'create_order': 'Crear pedido y PDF' in os.environ.get('ACTIONS',''),
            'catalog_status': 'Base operativa disponible' in os.environ.get('VIEWS',''),
            'catalog_view': 'Catálogo de compras' in os.environ.get('VIEWS',''),
            'user_admin': 'Administrar usuarios' in os.environ.get('VIEWS',''),
            'cancel_button': 'id="modalClose"' in os.environ.get('INDEX',''),
            'novalidate': 'novalidate' in os.environ.get('INDEX',''),
            'no_brand_login': 'loginOrg' not in os.environ.get('INDEX',''),
          }
          print(json.dumps({'health':h,'checks':checks},ensure_ascii=False,indent=2))
          sys.exit(0 if all(checks.values()) else 1)
          PY
            then
              exit 0
            fi
            sleep 10
          done
          exit 1
