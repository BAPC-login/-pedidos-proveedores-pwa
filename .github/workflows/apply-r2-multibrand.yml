name: Apply R2 multibrand upgrade

on:
  pull_request:
    paths:
      - '.github/workflows/apply-r2-multibrand.yml'

permissions:
  contents: write

jobs:
  apply-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch platform, storage and UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Missing patch marker: {label}')
              return text.replace(old, new, 1)

          # Schema v7: global owner, R2 links and immutable snapshots.
          path = 'professional/worker/src/schema.js'
          text = read(path)
          text = replace_once(text, "import invoiceSchemaModule from '../../migrations/0003_invoices.sql';\n", "import invoiceSchemaModule from '../../migrations/0003_invoices.sql';\nimport platformSchemaModule from '../../migrations/0004_multibrand_r2_history.sql';\n", 'schema import')
          text = re.sub(r"const SCHEMA_VERSION = '\d+';", "const SCHEMA_VERSION = '7';", text, count=1)
          text = replace_once(text, "const invoiceSchema = normalizeSql(invoiceSchemaModule, 'invoices');\n", "const invoiceSchema = normalizeSql(invoiceSchemaModule, 'invoices');\nconst platformSchema = normalizeSql(platformSchemaModule, 'platform-r2-history');\n", 'schema normalized')
          text = replace_once(text, "    const invoiceStatements = await executeSchema(env.DB, invoiceSchema, 'invoices');\n    const seeded", "    const invoiceStatements = await executeSchema(env.DB, invoiceSchema, 'invoices');\n    const platformStatements = await executeSchema(env.DB, platformSchema, 'platform-r2-history');\n    const seeded", 'schema execution')
          text = replace_once(text, "statements: identityStatements + procurementStatements + invoiceStatements", "statements: identityStatements + procurementStatements + invoiceStatements + platformStatements", 'schema count')
          write(path, text)

          # Authentication: platform-owner flag and strict local scopes.
          path = 'professional/worker/src/auth.js'
          text = read(path)
          helper = '''\nasync function validateLocationScope(env, actor, requested, role) {\n  if (role === ROLES.OWNER) return ['*'];\n  const values = [...new Set((Array.isArray(requested) ? requested : []).map(String).filter(Boolean))];\n  if (values.includes('*')) throw new HttpError(403, 'Solo el owner puede acceder a todos los locales', 'owner_scope_required');\n  if (!values.length) throw new HttpError(400, 'Selecciona al menos un local para este usuario', 'location_scope_required');\n  for (const locationId of values) {\n    const location = await env.DB.prepare('SELECT id FROM locations WHERE id = ? AND org_id = ? AND active = 1').bind(locationId, actor.orgId).first();\n    if (!location) throw new HttpError(400, 'Uno de los locales seleccionados no es válido', 'invalid_location_scope');\n  }\n  return values;\n}\n'''
          text = replace_once(text, "function safeJson(value, fallback) {\n  try { return JSON.parse(value || ''); } catch { return fallback; }\n}\n", "function safeJson(value, fallback) {\n  try { return JSON.parse(value || ''); } catch { return fallback; }\n}\n" + helper, 'auth helper')
          text = replace_once(text, "  env.DB.prepare('UPDATE sessions SET last_seen_at = ? WHERE id = ?')\n    .bind(nowIso(), row.session_id).run().catch(() => {});\n  return {", "  env.DB.prepare('UPDATE sessions SET last_seen_at = ? WHERE id = ?')\n    .bind(nowIso(), row.session_id).run().catch(() => {});\n  const platformOwner = await env.DB.prepare('SELECT user_id FROM platform_owners WHERE user_id = ?').bind(row.user_id).first();\n  return {", 'auth platform owner query')
          text = replace_once(text, "    organization: {id: row.org_id, name: row.org_name, slug: row.org_slug, plan: row.plan}\n", "    organization: {id: row.org_id, name: row.org_name, slug: row.org_slug, plan: row.plan},\n    isPlatformOwner: Boolean(platformOwner)\n", 'auth actor flag')
          text = replace_once(text, "      .bind(membershipId, orgId, userId, ROLES.OWNER, JSON.stringify(['*']), timestamp, timestamp)\n  ];", "      .bind(membershipId, orgId, userId, ROLES.OWNER, JSON.stringify(['*']), timestamp, timestamp),\n    env.DB.prepare('INSERT INTO platform_owners (user_id, created_at) VALUES (?, ?)').bind(userId, timestamp)\n  ];", 'bootstrap platform owner')
          text = replace_once(text, "      locationScope: actor.locationScope\n", "      locationScope: actor.locationScope,\n      isPlatformOwner: Boolean(actor.isPlatformOwner)\n", 'me platform owner')
          text = text.replace("const locationScope = Array.isArray(body.locationScope) && body.locationScope.length ? body.locationScope : ['*'];", "const locationScope = await validateLocationScope(env, actor, body.locationScope, role);", 2)
          write(path, text)

          # API router: brands, document search and R2 health.
          path = 'professional/worker/src/index.js'
          text = read(path)
          text = replace_once(text, "} from './api/documents.js';\n", "} from './api/documents.js';\nimport {createBrand, listBrands, switchBrand} from './platform.js';\nimport {listDocuments} from './storage.js';\n", 'index imports')
          text = replace_once(text, "      storageConfigured: Boolean(env.FILES),\n", "      storageConfigured: Boolean(env.FILES),\n      storageBackend: env.FILES ? 'r2' : 'unavailable',\n", 'health storage')
          text = replace_once(text, "  if (method === 'GET' && path === '/api/dashboard') return ok(await dashboard(env, actor), request, env);\n", "  if (method === 'GET' && path === '/api/dashboard') return ok(await dashboard(env, actor), request, env);\n\n  if (method === 'GET' && path === '/api/brands') return ok({brands: await listBrands(env, actor)}, request, env);\n  if (method === 'POST' && path === '/api/brands') return ok({brand: await createBrand(request, env, actor)}, request, env);\n  let brandParams = routeMatch(path, '/api/brands/:id/switch');\n  if (brandParams && method === 'POST') return ok(await switchBrand(request, env, actor, brandParams.id), request, env);\n", 'brand routes')
          text = replace_once(text, "  if (method === 'POST' && path === '/api/files') return ok({file: await uploadFile(request, env, actor, url)}, request, env);\n", "  if (method === 'GET' && path === '/api/documents') return ok({documents: await listDocuments(env, actor, {entityType: String(url.searchParams.get('entityType') || ''), entityId: String(url.searchParams.get('entityId') || ''), kind: String(url.searchParams.get('kind') || '')})}, request, env);\n  if (method === 'POST' && path === '/api/files') return ok({file: await uploadFile(request, env, actor, url)}, request, env);\n", 'document route')
          write(path, text)

          # Orders: generate and archive a PDF plus snapshot for every revision/state.
          path = 'professional/worker/src/api/orders.js'
          text = read(path)
          text = replace_once(text, "import {writeAudit} from '../auth.js';\n", "import {writeAudit} from '../auth.js';\nimport {archiveOrderPdf} from '../storage.js';\n", 'orders storage import')
          text = replace_once(text, "  const created = await getOrder(env, actor, id);\n  if (idempotencyKey)", "  const created = await getOrder(env, actor, id);\n  created.pdfDocument = await archiveOrderPdf(env, actor, created);\n  if (idempotencyKey)", 'create pdf')
          text = replace_once(text, "  await writeAudit(env, actor, request, 'order.update', 'order', orderId, {revision: Number(current.revision || 1) + 1});\n  return await getOrder(env, actor, orderId);", "  await writeAudit(env, actor, request, 'order.update', 'order', orderId, {revision: Number(current.revision || 1) + 1});\n  const updated = await getOrder(env, actor, orderId);\n  updated.pdfDocument = await archiveOrderPdf(env, actor, updated);\n  return updated;", 'update pdf')
          text = replace_once(text, "UPDATE orders SET status = ?, approved_by = ?, sent_at = ?, cancelled_at = ?, updated_at = ?", "UPDATE orders SET status = ?, approved_by = ?, sent_at = ?, cancelled_at = ?, revision = revision + 1, updated_at = ?", 'transition revision')
          text = replace_once(text, "  await writeAudit(env, actor, request, 'order.transition', 'order', orderId, {from: order.status, to, reason});\n  return await getOrder(env, actor, orderId);", "  await writeAudit(env, actor, request, 'order.transition', 'order', orderId, {from: order.status, to, reason});\n  const transitioned = await getOrder(env, actor, orderId);\n  transitioned.pdfDocument = await archiveOrderPdf(env, actor, transitioned);\n  return transitioned;", 'transition pdf')
          text = replace_once(text, "UPDATE orders SET status = ?, updated_at = ? WHERE id = ?", "UPDATE orders SET status = ?, revision = revision + 1, updated_at = ? WHERE id = ?", 'reception revision')
          text = replace_once(text, "  await writeAudit(env, actor, request, 'reception.create', 'reception', receptionId, {orderId, status: nextStatus});\n  return {id: receptionId, orderId, status: 'completed', orderStatus: nextStatus};", "  await writeAudit(env, actor, request, 'reception.create', 'reception', receptionId, {orderId, status: nextStatus});\n  const receivedOrder = await getOrder(env, actor, orderId);\n  const pdfDocument = await archiveOrderPdf(env, actor, receivedOrder);\n  return {id: receptionId, orderId, status: 'completed', orderStatus: nextStatus, pdfDocument};", 'reception pdf')
          write(path, text)

          # Invoices and generic files: archive original source in R2 and link it after review.
          path = 'professional/worker/src/api/documents.js'
          text = read(path)
          text = replace_once(text, "import {writeAudit} from '../auth.js';\n", "import {writeAudit} from '../auth.js';\nimport {getStoredFile, linkExistingFile, recordSnapshot, storeFile} from '../storage.js';\n", 'documents storage import')
          text = replace_once(text, "    createdAt: invoice.created_at\n", "    createdAt: invoice.created_at,\n    pdfFileId: invoice.pdf_file_id || null\n", 'invoice file field')
          text = replace_once(text, "  await env.DB.batch(statements);\n  await writeAudit(env, actor, request, 'invoice.create',", "  await env.DB.batch(statements);\n  if (body.sourceFileId) {\n    await env.DB.prepare('UPDATE invoices SET pdf_file_id = ?, updated_at = ? WHERE id = ? AND org_id = ?').bind(String(body.sourceFileId), nowIso(), invoiceId, actor.orgId).run();\n    await linkExistingFile(env, actor, {fileId: String(body.sourceFileId), entityType: 'invoice', entityId: invoiceId, documentKind: 'invoice_original', revision: 1, metadata: {invoiceNumber}});\n  }\n  await recordSnapshot(env, actor, {entityType: 'invoice', entityId: invoiceId, revision: 1, snapshot: {...body, id: invoiceId, supplierName: supplier.name}});\n  await writeAudit(env, actor, request, 'invoice.create',", 'invoice link source')
          text = replace_once(text, "  if (file.size > 12 * 1024 * 1024) throw new HttpError(413, 'La factura supera 12 MB', 'file_too_large');\n  const upstream", "  if (file.size > 12 * 1024 * 1024) throw new HttpError(413, 'La factura supera 12 MB', 'file_too_large');\n  const sourceFile = await storeFile(env, actor, file, {purpose: 'invoice-source'});\n  const upstream", 'invoice source archive')
          text = replace_once(text, "  return payload;\n}\n\nexport async function uploadFile", "  return {...payload, sourceFile};\n}\n\nexport async function uploadFile", 'analysis response file')
          pattern = re.compile(r"export async function uploadFile\(request, env, actor, url\) \{.*?\n\}\n\nexport async function getFile\(env, actor, key\) \{.*?\n\}\n", re.S)
          replacement = '''export async function uploadFile(request, env, actor, url) {\n  const form = await request.formData();\n  const file = form.get('file');\n  if (!(file instanceof File)) throw new HttpError(400, 'Adjunta un archivo', 'missing_file');\n  if (file.size > 20 * 1024 * 1024) throw new HttpError(413, 'El archivo supera 20 MB', 'file_too_large');\n  const purpose = String(url.searchParams.get('purpose') || 'general').replace(/[^a-z0-9_-]/gi, '').slice(0, 40) || 'general';\n  const stored = await storeFile(env, actor, file, {purpose});\n  await incrementUsage(env, actor.orgId, 'file_bytes', file.size);\n  await writeAudit(env, actor, request, 'file.upload', 'file', stored.id, {purpose, size: file.size, key: stored.key});\n  return stored;\n}\n\nexport async function getFile(env, actor, key) {\n  return getStoredFile(env, actor, key);\n}\n'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1: raise SystemExit('Could not replace documents file API')
          write(path, text)

          # Browser: persist invoice source file ID.
          path = 'professional/web/app-invoices.js'
          text = read(path)
          text = replace_once(text, "        aiModel:analysis.model||'',\n", "        aiModel:analysis.model||'',\n        sourceFileId:analysis.sourceFile?.id||'',\n", 'invoice UI source')
          write(path, text)

          # Browser core: brands cache.
          path = 'professional/web/app-core.js'
          text = read(path)
          text = replace_once(text, "locations:[],users:[],audit:[]", "locations:[],users:[],audit:[],brands:[]", 'core brands cache')
          write(path, text)

          # Actions: local-scoped users and owner brand creation/switching.
          path = 'professional/web/app-actions.js'
          text = read(path)
          user_pattern = re.compile(r"function openUser\(\)\{.*?\n\}\nfunction openChangePassword", re.S)
          user_replacement = '''async function openUser(){\n  if(!state.cache.locations.length)state.cache.locations=(await api('/api/locations')).locations;\n  const locationOptions=state.cache.locations.map(location=>`<label class="field"><span><input type="checkbox" name="locationScope" value="${esc(location.id)}"> ${esc(location.name)}</span></label>`).join('');\n  openModal({eyebrow:'SEGURIDAD',title:'Nuevo usuario',subtitle:'Asigna solo los locales que este usuario puede consultar y operar.',body:`<div class="form-grid"><label class="field"><span>Nombre</span><input name="displayName" required></label><label class="field"><span>Correo</span><input name="email" type="email" required></label><label class="field"><span>Contraseña inicial</span><input name="password" type="password" minlength="10" required></label><label class="field"><span>Rol</span><select name="role"><option value="readonly">Solo lectura</option><option value="purchaser">Compras</option><option value="receiver">Recepción</option><option value="approver">Aprobador</option><option value="finance">Finanzas</option><option value="admin">Administrador</option></select></label><div class="full"><div class="panel-head"><h3>Locales permitidos</h3><small>Solo el owner ve todos</small></div><div class="form-grid">${locationOptions}</div></div></div>`,onSubmit:async form=>{const locationScope=form.getAll('locationScope').map(String);if(!locationScope.length)throw new Error('Selecciona al menos un local');await api('/api/users',{method:'POST',json:{displayName:form.get('displayName'),email:form.get('email'),password:form.get('password'),role:form.get('role'),locationScope}});toast('Usuario creado');await navigate('team')}});\n}\nfunction openBrand(){\n  openModal({eyebrow:'OWNER',title:'Nueva marca',subtitle:'Se creará con su primer local y datos completamente separados.',body:`<div class="form-grid"><label class="field"><span>Nombre de la marca</span><input name="name" required></label><label class="field"><span>Identificador</span><input name="slug" placeholder="ej: madriguera"></label><label class="field"><span>Primer local</span><input name="locationName" value="Principal" required></label><label class="field"><span>Código del local</span><input name="locationCode" placeholder="MDR"></label></div>`,submitLabel:'Crear marca',onSubmit:async form=>{await api('/api/brands',{method:'POST',json:Object.fromEntries(form)});toast('Marca creada');state.cache.brands=[];await navigate('settings')}});\n}\nasync function switchBrand(id){\n  const response=await api(`/api/brands/${id}/switch`,{method:'POST',json:{}});\n  state.token=response.token;localStorage.setItem('pp:token',state.token);state.me=await api('/api/me');state.cache={dashboard:null,orders:[],products:[],suppliers:[],categories:[],locations:[],users:[],audit:[],brands:[]};showApp();await navigate('dashboard');toast('Marca activa actualizada');\n}\nfunction openChangePassword'''
          text, count = user_pattern.subn(user_replacement, text, count=1)
          if count != 1: raise SystemExit('Could not replace user action')
          text = replace_once(text, "  $$('[data-toggle-user]').forEach(node=>node.onclick=async()=>{const active=node.dataset.active==='1';await api(`/api/users/${node.dataset.toggleUser}`,{method:'PATCH',json:{active:!active,locationScope:['*']}});", "  $$('[data-toggle-user]').forEach(node=>node.onclick=async()=>{const active=node.dataset.active==='1';const user=state.cache.users.find(item=>item.id===node.dataset.toggleUser);await api(`/api/users/${node.dataset.toggleUser}`,{method:'PATCH',json:{active:!active,role:user?.role,locationScope:user?.locationScope||[]}});", 'toggle scope')
          text = replace_once(text, "  $$('[data-revoke-session]').forEach", "  $$('[data-switch-brand]').forEach(node=>node.onclick=()=>switchBrand(node.dataset.switchBrand));\n  $$('[data-revoke-session]').forEach", 'switch bind')
          text = replace_once(text, "  if(action==='change-password')return openChangePassword();\n", "  if(action==='change-password')return openChangePassword();\n  if(action==='new-brand')return openBrand();\n", 'brand action')
          write(path, text)

          # Views: show local scopes and owner brand manager.
          path = 'professional/web/app-views.js'
          text = read(path)
          team_pattern = re.compile(r"async function renderTeam\(\)\{.*?\n\}\n\nasync function renderAudit", re.S)
          team_replacement = '''async function renderTeam(){\n  const [payload,locationPayload]=await Promise.all([api('/api/users'),api('/api/locations')]);state.cache.users=payload.users;state.cache.locations=locationPayload.locations;\n  const locationMap=new Map(state.cache.locations.map(location=>[location.id,location.name]));\n  const scopeLabel=user=>user.role==='owner'||user.locationScope?.includes('*')?'Todos los locales':(user.locationScope||[]).map(id=>locationMap.get(id)||id).join(', ');\n  $('#mainContent').innerHTML=`<div class="view-header"><div><span class="eyebrow">ACCESO POR LOCAL</span><h2>Equipo</h2><p>Cada cuenta opera únicamente en los locales asignados. Solo el owner accede a todos.</p></div><button class="btn primary" data-action="new-user">＋ Nuevo usuario</button></div><section class="table-card"><table class="data-table"><thead><tr><th>Usuario</th><th>Rol</th><th>Locales</th><th>Estado</th><th>Sesiones</th><th></th></tr></thead><tbody>${payload.users.map(u=>`<tr><td><strong>${esc(u.displayName)}</strong><br><small>${esc(u.email)}</small></td><td>${esc(roleNames[u.role]||u.role)}</td><td>${esc(scopeLabel(u))}</td><td><span class="status ${u.active?'active':'inactive'}">${u.active?'Activo':'Revocado'}</span></td><td>${u.activeSessions}</td><td><button class="btn small ${u.active?'danger':''}" data-toggle-user="${esc(u.id)}" data-active="${u.active?'1':'0'}">${u.active?'Revocar':'Reactivar'}</button></td></tr>`).join('')}</tbody></table></section>`;bindDynamic();\n}\n\nasync function renderAudit'''
          text, count = team_pattern.subn(team_replacement, text, count=1)
          if count != 1: raise SystemExit('Could not replace team view')
          settings_pattern = re.compile(r"async function renderSettings\(\)\{.*?\n\}\n\nexport", re.S)
          settings_replacement = '''async function renderSettings(){\n  const [sessionPayload,brandPayload]=await Promise.all([api('/api/sessions'),api('/api/brands')]);\n  const sessions=sessionPayload.sessions;state.cache.brands=brandPayload.brands;const theme=document.documentElement.dataset.theme;const platformOwner=Boolean(state.me.user.isPlatformOwner);\n  const brands=state.cache.brands.map(brand=>`<article class="entity-card"><div class="entity-head"><span class="entity-logo">${esc(initials(brand.name))}</span><span class="status ${brand.current?'active':''}">${brand.current?'Activa':brand.status}</span></div><h3>${esc(brand.name)}</h3><p>${esc(brand.locations.map(location=>location.name).join(' · ')||'Sin locales')}</p><div class="entity-actions">${brand.current?'':`<button class="btn small" data-switch-brand="${esc(brand.id)}">Entrar a esta marca</button>`}</div></article>`).join('');\n  $('#mainContent').innerHTML=`<div class="view-header"><div><span class="eyebrow">PREFERENCIAS Y SEGURIDAD</span><h2>Configuración</h2><p>Marcas, apariencia, almacenamiento y dispositivos conectados.</p></div>${platformOwner?'<button class="btn primary" data-action="new-brand">＋ Nueva marca</button>':''}</div><section class="panel-grid"><article class="panel"><div class="panel-head"><h3>Apariencia</h3></div><label class="field"><span>Tema</span><select id="themeSelect"><option value="system">Usar sistema</option><option value="light">Claro</option><option value="dark">Oscuro</option></select></label></article><article class="panel"><div class="panel-head"><h3>Archivo documental</h3></div><p style="color:var(--muted);font-size:11px;line-height:1.6">Facturas originales y PDF históricos de cada folio se conservan en Cloudflare R2, mientras D1 mantiene índices, hashes y revisiones para búsqueda y Dashboard.</p></article></section><div class="view-header" style="margin-top:18px"><div><span class="eyebrow">WORKSPACES</span><h2>Marcas y locales</h2></div></div><section class="cards-grid">${brands}</section><section class="table-card" style="margin-top:18px"><div class="panel-head" style="padding:16px"><h3>Sesiones</h3><small>No vencen, pero siempre pueden revocarse.</small></div><table class="data-table"><thead><tr><th>Usuario</th><th>Dispositivo</th><th>Creada</th><th>Último uso</th><th></th></tr></thead><tbody>${sessions.map(s=>`<tr><td>${esc(s.displayName)}${s.current?' · actual':''}</td><td>${esc((s.userAgent||'Dispositivo').slice(0,80))}</td><td>${date(s.createdAt)}</td><td>${date(s.lastSeenAt)}</td><td><button class="btn small danger" data-revoke-session="${esc(s.id)}">Revocar</button></td></tr>`).join('')}</tbody></table></section>`;\n  $('#themeSelect').value=theme;$('#themeSelect').addEventListener('change',event=>setTheme(event.target.value));bindDynamic();\n}\n\nexport'''
          text, count = settings_pattern.subn(settings_replacement, text, count=1)
          if count != 1: raise SystemExit('Could not replace settings view')
          write(path, text)

          # Order detail: expose all historical PDFs.
          path = 'professional/web/app-order-detail.js'
          text = read(path)
          text = replace_once(text, "  const order=(await api(`/api/orders/${id}`)).order;\n", "  const order=(await api(`/api/orders/${id}`)).order;\n  const documents=(await api(`/api/documents?entityType=order&entityId=${encodeURIComponent(id)}`)).documents;\n", 'order documents fetch')
          text = replace_once(text, "${order.events.map(event=>", "${documents.length?`<div class=\"panel-head\" style=\"margin-top:16px\"><h3>PDF históricos</h3></div><div class=\"stack\">${documents.map(document=>`<a class=\"btn small\" target=\"_blank\" rel=\"noopener\" href=\"/api/files/${encodeURIComponent(document.key)}\">${esc(document.name)} · revisión ${document.revision}</a>`).join('')}</div>`:''}<div class=\"activity-list\" style=\"margin-top:16px\">${order.events.map(event=>", 'order docs UI')
          write(path, text)

          # Gemini: shorter prompt, same deterministic structured schema, lower output ceiling.
          path = 'worker/src/index.js'
          text = read(path)
          prompt_pattern = re.compile(r"function buildPrompt\(context\) \{.*?\n\}\n\nasync function parseGeminiResponse", re.S)
          prompt_replacement = '''function buildPrompt(context) {\n  const products = (context.products || []).map(product => ({\n    id: String(product.productId), d: String(product.description), u: String(product.unit || 'UNIDAD'), q: numeric(product.orderedQty), pack: orderPackSize(product.unit, product.description)\n  }));\n  return `<task>Extrae y coteja la factura A contra el pedido B y CAT. Responde solo según el JSON Schema.</task>\n<CAT>${JSON.stringify(products)}</CAT>\n<context>proveedor=${String(context.providerName || '')};folio=${String(context.folio || '')}</context>\n<rules>\n- Una salida por producto facturado. Excluye flete, despacho, impuestos, descuentos, depósitos, garantías y totales.\n- quantityCellRaw copia la celda Cantidad; invoiceQuantity sale solo de ella.\n- packSize sale de X06/X6/1000CCX6/6X350CC. units=invoiceQuantity*packSize.\n- Match por marca, familia, variante y volumen. Volumen distinto invalida. Abreviaturas: ESP=ESPECIAL, TRANS=TRANSPARENTE, ZERO=SIN AZUCAR.\n- matchedOrderProductId debe ser un id exacto de CAT o vacío; nunca inventes.\n- DISPLAY=24, salvo 1.5L=6, excepto si la factura imprime otro pack.\n- Lee neto, descuento, flete, IVA, impuesto adicional, otros cargos y total final por línea.\n- Números sin símbolos ni separadores. Ilegible=0 y agrega warning breve.\n</rules>`;\n}\n\nasync function parseGeminiResponse'''
          text, count = prompt_pattern.subn(prompt_replacement, text, count=1)
          if count != 1: raise SystemExit('Could not replace Gemini prompt')
          text = text.replace('maxOutputTokens: 16384', 'maxOutputTokens: 8192', 1)
          write(path, text)

          # R2 automatic provisioning from the connected Cloudflare build.
          path = 'worker/wrangler.jsonc'
          config = json.loads(read(path))
          config['r2_buckets'] = [{'binding': 'FILES'}]
          write(path, json.dumps(config, ensure_ascii=False, indent=2) + '\n')

          # Force fresh service-worker assets.
          path = 'professional/web/sw.js'
          text = read(path)
          text = re.sub(r"const VERSION = '[^']+';", "const VERSION = 'pedidos-pro-platform-v2-r2-multibrand';", text, count=1)
          write(path, text)
          PY

          node --check professional/worker/src/storage.js
          node --check professional/worker/src/platform.js
          node --check professional/worker/src/schema.js
          node --check professional/worker/src/auth.js
          node --check professional/worker/src/index.js
          node --check professional/worker/src/api/orders.js
          node --check professional/worker/src/api/documents.js
          node --check professional/web/app-core.js
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app-order-detail.js
          node --check professional/web/app-invoices.js
          node --check worker/src/index.js

      - name: Run professional tests
        working-directory: professional
        run: npm run verify

      - name: Commit generated upgrade
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add professional worker
          git commit -m "feat(platform): enable R2 history and owner multibrand workspaces"
          git push origin HEAD:${{ github.head_ref }}
