name: Apply R2 multibrand upgrade

on:
  pull_request:
    paths:
      - '.github/workflows/apply-r2-multibrand.yml'

permissions:
  contents: write

jobs:
  apply-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch schema v7
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('professional/worker/src/schema.js');t=p.read_text(encoding='utf-8')
          t=t.replace("import invoiceSchemaModule from '../../migrations/0003_invoices.sql';\n","import invoiceSchemaModule from '../../migrations/0003_invoices.sql';\nimport platformSchemaModule from '../../migrations/0004_multibrand_r2_history.sql';\n",1)
          t=re.sub(r"const SCHEMA_VERSION = '\d+';","const SCHEMA_VERSION = '7';",t,count=1)
          t=t.replace("const invoiceSchema = normalizeSql(invoiceSchemaModule, 'invoices');\n","const invoiceSchema = normalizeSql(invoiceSchemaModule, 'invoices');\nconst platformSchema = normalizeSql(platformSchemaModule, 'platform-r2-history');\n",1)
          t=t.replace("    const invoiceStatements = await executeSchema(env.DB, invoiceSchema, 'invoices');\n    const seeded","    const invoiceStatements = await executeSchema(env.DB, invoiceSchema, 'invoices');\n    const platformStatements = await executeSchema(env.DB, platformSchema, 'platform-r2-history');\n    const seeded",1)
          t=t.replace("statements: identityStatements + procurementStatements + invoiceStatements","statements: identityStatements + procurementStatements + invoiceStatements + platformStatements",1)
          for marker in ['platformSchemaModule','platformSchema =','platformStatements','SCHEMA_VERSION = \'7\'']:
              assert marker in t, marker
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/worker/src/schema.js

      - name: Patch authentication ownership and local scopes
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('professional/worker/src/auth.js');t=p.read_text(encoding='utf-8')
          safe="function safeJson(value, fallback) {\n  try { return JSON.parse(value || ''); } catch { return fallback; }\n}\n"
          helper="""\nasync function validateLocationScope(env, actor, requested, role) {\n  if (role === ROLES.OWNER) return ['*'];\n  const values = [...new Set((Array.isArray(requested) ? requested : []).map(String).filter(Boolean))];\n  if (values.includes('*')) throw new HttpError(403, 'Solo el owner puede acceder a todos los locales', 'owner_scope_required');\n  if (!values.length) throw new HttpError(400, 'Selecciona al menos un local para este usuario', 'location_scope_required');\n  for (const locationId of values) {\n    const location = await env.DB.prepare('SELECT id FROM locations WHERE id = ? AND org_id = ? AND active = 1').bind(locationId, actor.orgId).first();\n    if (!location) throw new HttpError(400, 'Uno de los locales seleccionados no es válido', 'invalid_location_scope');\n  }\n  return values;\n}\n"""
          assert safe in t
          t=t.replace(safe,safe+helper,1)
          old="  env.DB.prepare('UPDATE sessions SET last_seen_at = ? WHERE id = ?')\n    .bind(nowIso(), row.session_id).run().catch(() => {});\n  return {"
          assert old in t
          t=t.replace(old,"  env.DB.prepare('UPDATE sessions SET last_seen_at = ? WHERE id = ?')\n    .bind(nowIso(), row.session_id).run().catch(() => {});\n  const platformOwner = await env.DB.prepare('SELECT user_id FROM platform_owners WHERE user_id = ?').bind(row.user_id).first();\n  return {",1)
          old="    organization: {id: row.org_id, name: row.org_name, slug: row.org_slug, plan: row.plan}\n"
          assert old in t
          t=t.replace(old,"    organization: {id: row.org_id, name: row.org_name, slug: row.org_slug, plan: row.plan},\n    isPlatformOwner: Boolean(platformOwner)\n",1)
          old="      .bind(membershipId, orgId, userId, ROLES.OWNER, JSON.stringify(['*']), timestamp, timestamp)\n  ];"
          assert old in t
          t=t.replace(old,"      .bind(membershipId, orgId, userId, ROLES.OWNER, JSON.stringify(['*']), timestamp, timestamp),\n    env.DB.prepare('INSERT INTO platform_owners (user_id, created_at) VALUES (?, ?)').bind(userId, timestamp)\n  ];",1)
          old="      locationScope: actor.locationScope\n"
          assert old in t
          t=t.replace(old,"      locationScope: actor.locationScope,\n      isPlatformOwner: Boolean(actor.isPlatformOwner)\n",1)
          marker="const locationScope = Array.isArray(body.locationScope) && body.locationScope.length ? body.locationScope : ['*'];"
          assert t.count(marker)==2,t.count(marker)
          t=t.replace(marker,"const locationScope = await validateLocationScope(env, actor, body.locationScope, role);")
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/worker/src/auth.js

      - name: Patch brand and document routes
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('professional/worker/src/index.js');t=p.read_text(encoding='utf-8')
          old="} from './api/documents.js';\n";assert old in t
          t=t.replace(old,"} from './api/documents.js';\nimport {createBrand, listBrands, switchBrand} from './platform.js';\nimport {listDocuments} from './storage.js';\n",1)
          old="      storageConfigured: Boolean(env.FILES),\n";assert old in t
          t=t.replace(old,"      storageConfigured: Boolean(env.FILES),\n      storageBackend: env.FILES ? 'r2' : 'unavailable',\n",1)
          old="  if (method === 'GET' && path === '/api/dashboard') return ok(await dashboard(env, actor), request, env);\n";assert old in t
          t=t.replace(old,old+"\n  if (method === 'GET' && path === '/api/brands') return ok({brands: await listBrands(env, actor)}, request, env);\n  if (method === 'POST' && path === '/api/brands') return ok({brand: await createBrand(request, env, actor)}, request, env);\n  const brandParams = routeMatch(path, '/api/brands/:id/switch');\n  if (brandParams && method === 'POST') return ok(await switchBrand(request, env, actor, brandParams.id), request, env);\n",1)
          old="  if (method === 'POST' && path === '/api/files') return ok({file: await uploadFile(request, env, actor, url)}, request, env);\n";assert old in t
          t=t.replace(old,"  if (method === 'GET' && path === '/api/documents') return ok({documents: await listDocuments(env, actor, {entityType: String(url.searchParams.get('entityType') || ''), entityId: String(url.searchParams.get('entityId') || ''), kind: String(url.searchParams.get('kind') || '')})}, request, env);\n"+old,1)
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/worker/src/platform.js
          node --check professional/worker/src/storage.js
          node --check professional/worker/src/index.js

      - name: Commit identity upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add professional
          git commit -m "feat(platform): add owner multibrand identity model"
          git push origin HEAD:${{ github.head_ref }}
