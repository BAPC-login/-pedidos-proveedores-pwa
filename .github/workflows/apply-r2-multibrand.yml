name: Apply R2 multibrand upgrade

on:
  pull_request:
    paths:
      - '.github/workflows/apply-r2-multibrand.yml'

permissions:
  contents: write

jobs:
  finalize-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Scope invoice history and expose R2 files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('professional/worker/src/api/documents.js');t=p.read_text(encoding='utf-8')
          safe="function safeJson(value, fallback = null) {\n  try { return JSON.parse(value || ''); } catch { return fallback; }\n}\n"
          helper="""\nfunction locationAllowed(actor, locationId) {\n  return actor.locationScope?.includes?.('*') || actor.locationScope?.includes?.(locationId);\n}\n"""
          if helper.strip() not in t:
              assert safe in t
              t=t.replace(safe,safe+helper,1)
          old="""    SELECT i.*, s.name AS supplier_name
    FROM invoices i JOIN suppliers s ON s.id = i.supplier_id
    WHERE i.org_id = ? AND (? = '' OR i.supplier_id = ?)
    ORDER BY i.invoice_date DESC, i.created_at DESC LIMIT 500
  `).bind(actor.orgId, supplierId, supplierId).all();
  return rows(result).map(invoice => ({"""
          new="""    SELECT i.*, s.name AS supplier_name,
      GROUP_CONCAT(DISTINCT il.location_id) AS location_ids,
      GROUP_CONCAT(DISTINCT l.name) AS location_names,
      f.storage_key AS pdf_key, f.file_name AS pdf_name
    FROM invoices i
    JOIN suppliers s ON s.id = i.supplier_id
    LEFT JOIN invoice_location_links il ON il.invoice_id = i.id
    LEFT JOIN locations l ON l.id = il.location_id
    LEFT JOIN files f ON f.id = i.pdf_file_id
    WHERE i.org_id = ? AND (? = '' OR i.supplier_id = ?)
    GROUP BY i.id
    ORDER BY i.invoice_date DESC, i.created_at DESC LIMIT 500
  `).bind(actor.orgId, supplierId, supplierId).all();
  return rows(result).filter(invoice => {
    const locations=String(invoice.location_ids||'').split(',').filter(Boolean);
    return actor.locationScope?.includes?.('*') || locations.some(id=>locationAllowed(actor,id));
  }).map(invoice => ({"""
          assert old in t
          t=t.replace(old,new,1)
          old="""    pdfFileId: invoice.pdf_file_id || null
  }));"""
          new="""    pdfFileId: invoice.pdf_file_id || null,
    pdfKey: invoice.pdf_key || '',
    pdfName: invoice.pdf_name || '',
    locationIds: String(invoice.location_ids || '').split(',').filter(Boolean),
    locationNames: String(invoice.location_names || '').split(',').filter(Boolean)
  }));"""
          assert old in t
          t=t.replace(old,new,1)
          old="""  const totals = body.totals || {};
  const invoiceId = uuid();"""
          new="""  const totals = body.totals || {};
  const orderIds = [...new Set((Array.isArray(body.orderIds) ? body.orderIds : []).map(String).filter(Boolean))];
  const locationIds = new Set();
  if (!orderIds.length) {
    const locationId=String(body.locationId||'');
    const location=await env.DB.prepare('SELECT id FROM locations WHERE id = ? AND org_id = ? AND active = 1').bind(locationId,actor.orgId).first();
    if (!location || !locationAllowed(actor,location.id)) throw new HttpError(400,'Selecciona un local válido','invalid_location');
    locationIds.add(location.id);
  }
  const invoiceId = uuid();"""
          assert old in t
          t=t.replace(old,new,1)
          old="""  const orderIds = [...new Set((Array.isArray(body.orderIds) ? body.orderIds : []).map(String).filter(Boolean))];
  for (const orderId of orderIds) {
    const order = await env.DB.prepare('SELECT id FROM orders WHERE id = ? AND org_id = ? AND supplier_id = ?')
      .bind(orderId, actor.orgId, supplierId).first();
    if (!order) throw new HttpError(400, 'Pedido relacionado inválido', 'invalid_order');"""
          new="""  for (const orderId of orderIds) {
    const order = await env.DB.prepare('SELECT id, location_id FROM orders WHERE id = ? AND org_id = ? AND supplier_id = ?')
      .bind(orderId, actor.orgId, supplierId).first();
    if (!order || !locationAllowed(actor,order.location_id)) throw new HttpError(400, 'Pedido relacionado inválido', 'invalid_order');
    locationIds.add(order.location_id);"""
          assert old in t
          t=t.replace(old,new,1)
          old="""  await env.DB.batch(statements);
  if (body.sourceFileId) {"""
          new="""  for (const locationId of locationIds) {
    statements.push(env.DB.prepare('INSERT OR IGNORE INTO invoice_location_links (invoice_id, org_id, location_id, created_at) VALUES (?, ?, ?, ?)').bind(invoiceId,actor.orgId,locationId,timestamp));
  }
  await env.DB.batch(statements);
  if (body.sourceFileId) {"""
          assert old in t
          t=t.replace(old,new,1)
          old="await recordSnapshot(env, actor, {entityType: 'invoice', entityId: invoiceId, revision: 1, snapshot: {...body, id: invoiceId, supplierName: supplier.name}});"
          new="await recordSnapshot(env, actor, {entityType: 'invoice', entityId: invoiceId, locationId: [...locationIds][0] || null, revision: 1, snapshot: {...body, id: invoiceId, supplierName: supplier.name, locationIds:[...locationIds]}});"
          assert old in t
          t=t.replace(old,new,1)
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/worker/src/api/documents.js

      - name: Scope dashboard and allow owner local creation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('professional/worker/src/api/catalog.js');t=p.read_text(encoding='utf-8')
          pattern=re.compile(r"export async function dashboard\(env, actor\) \{.*?\n\}\n\nexport async function listLocations",re.S)
          replacement="""export async function dashboard(env, actor) {
  const scope=actor.locationScope?.includes?.('*')?'*':(actor.locationScope||[]).join(',');
  const orderScope=`(? = '*' OR instr(',' || ? || ',', ',' || location_id || ',') > 0)`;
  const invoiceScope=`(? = '*' OR EXISTS (SELECT 1 FROM invoice_location_links il WHERE il.invoice_id = invoices.id AND instr(',' || ? || ',', ',' || il.location_id || ',') > 0))`;
  const [orders,pending,spend,suppliers,products,issues,documents]=await Promise.all([
    env.DB.prepare(`SELECT COUNT(*) AS total FROM orders WHERE org_id = ? AND created_at >= datetime('now','-30 day') AND ${orderScope}`).bind(actor.orgId,scope,scope).first(),
    env.DB.prepare(`SELECT COUNT(*) AS total FROM orders WHERE org_id = ? AND status IN ('requested','approved','sent','confirmed','partially_received') AND ${orderScope}`).bind(actor.orgId,scope,scope).first(),
    env.DB.prepare(`SELECT COALESCE(SUM(gross_total),0) AS total FROM invoices WHERE org_id = ? AND invoice_date >= date('now','-30 day') AND status != 'void' AND ${invoiceScope}`).bind(actor.orgId,scope,scope).first(),
    env.DB.prepare('SELECT COUNT(*) AS total FROM suppliers WHERE org_id = ? AND active = 1').bind(actor.orgId).first(),
    env.DB.prepare('SELECT COUNT(*) AS total FROM products WHERE org_id = ? AND active = 1').bind(actor.orgId).first(),
    env.DB.prepare("SELECT COUNT(*) AS total FROM reconciliation_issues WHERE org_id = ? AND status = 'open'").bind(actor.orgId).first(),
    env.DB.prepare(`SELECT COUNT(*) AS total FROM document_links dl WHERE dl.org_id = ? AND (? = '*' OR EXISTS (SELECT 1 FROM entity_snapshots es WHERE es.org_id=dl.org_id AND es.entity_type=dl.entity_type AND es.entity_id=dl.entity_id AND instr(',' || ? || ',', ',' || es.location_id || ',') > 0))`).bind(actor.orgId,scope,scope).first()
  ]);
  const recent=await env.DB.prepare(`
    SELECT o.id,o.folio,o.status,o.delivery_date,o.created_at,o.gross_total,o.location_id,
      s.name AS supplier_name,l.name AS location_name,u.display_name AS requested_by_name
    FROM orders o JOIN suppliers s ON s.id=o.supplier_id JOIN locations l ON l.id=o.location_id
    LEFT JOIN users u ON u.id=o.requested_by
    WHERE o.org_id=? AND (?='*' OR instr(',' || ? || ',', ',' || o.location_id || ',') > 0)
    ORDER BY o.created_at DESC LIMIT 8
  `).bind(actor.orgId,scope,scope).all();
  const [orderHistory,spendHistory]=await Promise.all([
    env.DB.prepare(`SELECT substr(created_at,1,7) AS month,COUNT(*) AS total FROM orders WHERE org_id=? AND created_at>=datetime('now','-12 month') AND ${orderScope} GROUP BY month ORDER BY month`).bind(actor.orgId,scope,scope).all(),
    env.DB.prepare(`SELECT substr(invoice_date,1,7) AS month,COALESCE(SUM(gross_total),0) AS total FROM invoices WHERE org_id=? AND invoice_date>=date('now','-12 month') AND status!='void' AND ${invoiceScope} GROUP BY month ORDER BY month`).bind(actor.orgId,scope,scope).all()
  ]);
  return {
    metrics:{orders30d:Number(orders?.total||0),pendingOrders:Number(pending?.total||0),spend30d:Number(spend?.total||0),suppliers:Number(suppliers?.total||0),products:Number(products?.total||0),openIssues:Number(issues?.total||0),archivedDocuments:Number(documents?.total||0)},
    history:{orders:rows(orderHistory).map(row=>({month:row.month,total:Number(row.total||0)})),spend:rows(spendHistory).map(row=>({month:row.month,total:Number(row.total||0)}))},
    recentOrders:rows(recent).map(order=>({id:order.id,folio:order.folio,status:order.status,supplierName:order.supplier_name,locationName:order.location_name,requestedBy:order.requested_by_name,deliveryDate:order.delivery_date,grossTotal:Number(order.gross_total||0),createdAt:order.created_at}))
  };
}

export async function listLocations"""
          t,count=pattern.subn(replacement,t,count=1)
          if count!=1: raise SystemExit(f'Could not replace dashboard: {count}')
          old="  await enforceCountLimit(env, actor, 'locations', 'locations', 'AND active = 1');"
          assert old in t
          t=t.replace(old,"  if (!actor.isPlatformOwner) await enforceCountLimit(env, actor, 'locations', 'locations', 'AND active = 1');",1)
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/worker/src/api/catalog.js

      - name: Complete owner and local UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p=Path('professional/web/app-actions.js');t=p.read_text(encoding='utf-8')
          marker="function openBrand(){"
          location="""function openLocation(){
  openModal({eyebrow:'LOCALES',title:'Nuevo local',subtitle:'El local quedará disponible para pedidos y asignación de usuarios.',body:`<div class="form-grid"><label class="field"><span>Nombre</span><input name="name" required></label><label class="field"><span>Código</span><input name="code" placeholder="MDR"></label><label class="field full"><span>Zona horaria</span><input name="timezone" value="America/Santiago"></label></div>`,submitLabel:'Crear local',onSubmit:async form=>{await api('/api/locations',{method:'POST',json:Object.fromEntries(form)});state.cache.locations=[];toast('Local creado');await navigate('settings')}});
}

"""
          assert marker in t
          t=t.replace(marker,location+marker,1)
          old="  if(action==='new-brand')return openBrand();\n"
          assert old in t
          t=t.replace(old,old+"  if(action==='new-location')return openLocation();\n",1)
          p.write_text(t,encoding='utf-8')

          p=Path('professional/web/app-views.js');t=p.read_text(encoding='utf-8')
          old="${metric('Pedidos 30 días',m.orders30d,'Órdenes creadas')}${metric('Pendientes',m.pendingOrders,'Requieren gestión')}${metric('Compras 30 días',money(m.spend30d),'Facturas registradas')}${metric('Proveedores',m.suppliers,'Activos')}${metric('Productos',m.products,'En catálogo')}${metric('Diferencias',m.openIssues,'Sin resolver')}"
          new=old+"${metric('Documentos R2',m.archivedDocuments||0,'Históricos archivados')}"
          assert old in t
          t=t.replace(old,new,1)
          helper="""
async function openStoredDocument(key){
  const response=await fetch(`/api/files/${encodeURIComponent(key)}`,{headers:{Authorization:`Bearer ${state.token}`}});
  if(!response.ok){const payload=await response.json().catch(()=>({}));throw new Error(payload.error||'No se pudo abrir el documento')}
  const url=URL.createObjectURL(await response.blob());window.open(url,'_blank','noopener');setTimeout(()=>URL.revokeObjectURL(url),60000);
}
function bindStoredDocuments(){
  $$('[data-file-key]').forEach(button=>button.onclick=()=>openStoredDocument(button.dataset.fileKey).catch(error=>renderError(error)));
}
"""
          status="const statusLabel=value=>({draft:'Borrador',requested:'Solicitado',approved:'Aprobado',rejected:'Rechazado',sent:'Enviado',confirmed:'Confirmado',partially_received:'Recepción parcial',received:'Recibido',reconciled:'Conciliado',closed:'Cerrado',cancelled:'Anulado'}[value]||value);\n"
          assert status in t
          t=t.replace(status,status+helper,1)
          invoice_pattern=re.compile(r"function invoiceTable\(invoices\)\{.*?\n\}",re.S)
          invoice_replacement="""function invoiceTable(invoices){
  if(!invoices?.length)return '<div class="empty-state"><h3>Aún no hay facturas</h3><p>Sube una imagen o PDF y revisa el cotejo antes de guardarla.</p><button class="btn primary" data-action="analyze-invoice">Analizar primera factura</button></div>';
  return `<table class="data-table"><thead><tr><th>Documento</th><th>Proveedor</th><th>Local</th><th>Fecha</th><th>Estado</th><th>Total</th><th>Archivo</th></tr></thead><tbody>${invoices.map(i=>`<tr><td><strong>${esc(i.invoiceNumber)}</strong><br><small>Tipo ${esc(i.documentType)}</small></td><td>${esc(i.supplierName)}</td><td>${esc((i.locationNames||[]).join(', ')||'—')}</td><td>${date(i.invoiceDate)}</td><td><span class="status ${esc(i.status)}">${esc(i.status)}</span></td><td><strong>${money(i.grossTotal)}</strong></td><td>${i.pdfKey?`<button class="btn small" data-file-key="${esc(i.pdfKey)}">Abrir original</button>`:'—'}</td></tr>`).join('')}</tbody></table>`;
}"""
          t,count=invoice_pattern.subn(invoice_replacement,t,count=1)
          if count!=1: raise SystemExit('Could not replace invoice table')
          t=t.replace("$('#invoiceSearch').addEventListener('input',()=>{const q=$('#invoiceSearch').value.toLowerCase();$('#invoiceContainer').innerHTML=invoiceTable(state.cache.invoices.filter(i=>`${i.invoiceNumber} ${i.supplierName}`.toLowerCase().includes(q)))});bindDynamic();","$('#invoiceSearch').addEventListener('input',()=>{const q=$('#invoiceSearch').value.toLowerCase();$('#invoiceContainer').innerHTML=invoiceTable(state.cache.invoices.filter(i=>`${i.invoiceNumber} ${i.supplierName} ${(i.locationNames||[]).join(' ')}`.toLowerCase().includes(q)));bindStoredDocuments()});bindDynamic();bindStoredDocuments();",1)
          team_pattern=re.compile(r"async function renderTeam\(\)\{.*?\n\}\n\nasync function renderAudit",re.S)
          team="""async function renderTeam(){
  const [payload,locationPayload]=await Promise.all([api('/api/users'),api('/api/locations')]);state.cache.users=payload.users;state.cache.locations=locationPayload.locations;
  const locationMap=new Map(state.cache.locations.map(location=>[location.id,location.name]));
  const scopeLabel=user=>user.role==='owner'||user.locationScope?.includes('*')?'Todos los locales':(user.locationScope||[]).map(id=>locationMap.get(id)||id).join(', ');
  $('#mainContent').innerHTML=`<div class="view-header"><div><span class="eyebrow">ACCESO POR LOCAL</span><h2>Equipo</h2><p>Cada usuario opera únicamente en los locales asignados. Solo el owner accede a todos.</p></div><button class="btn primary" data-action="new-user">＋ Nuevo usuario</button></div><section class="table-card"><table class="data-table"><thead><tr><th>Usuario</th><th>Rol</th><th>Locales</th><th>Estado</th><th>Sesiones</th><th></th></tr></thead><tbody>${payload.users.map(u=>`<tr><td><strong>${esc(u.displayName)}</strong><br><small>${esc(u.email)}</small></td><td>${esc(roleNames[u.role]||u.role)}</td><td>${esc(scopeLabel(u))}</td><td><span class="status ${u.active?'active':'inactive'}">${u.active?'Activo':'Revocado'}</span></td><td>${u.activeSessions}</td><td><button class="btn small ${u.active?'danger':''}" data-toggle-user="${esc(u.id)}" data-active="${u.active?'1':'0'}">${u.active?'Revocar':'Reactivar'}</button></td></tr>`).join('')}</tbody></table></section>`;bindDynamic();
}

async function renderAudit"""
          t,count=team_pattern.subn(team,t,count=1)
          if count!=1: raise SystemExit('Could not replace team')
          settings_pattern=re.compile(r"async function renderSettings\(\)\{.*?\n\}\n\nexport",re.S)
          settings="""async function renderSettings(){
  const [sessionPayload,brandPayload,locationPayload]=await Promise.all([api('/api/sessions'),api('/api/brands'),api('/api/locations')]);
  const sessions=sessionPayload.sessions;state.cache.brands=brandPayload.brands;state.cache.locations=locationPayload.locations;const theme=document.documentElement.dataset.theme;const platformOwner=Boolean(state.me.user.isPlatformOwner);
  const brands=state.cache.brands.map(brand=>`<article class="entity-card"><div class="entity-head"><span class="entity-logo">${esc(initials(brand.name))}</span><span class="status ${brand.current?'active':''}">${brand.current?'Activa':brand.status}</span></div><h3>${esc(brand.name)}</h3><p>${esc(brand.locations.map(location=>location.name).join(' · ')||'Sin locales')}</p><div class="entity-actions">${brand.current?'':`<button class="btn small" data-switch-brand="${esc(brand.id)}">Entrar a esta marca</button>`}</div></article>`).join('');
  $('#mainContent').innerHTML=`<div class="view-header"><div><span class="eyebrow">OWNER Y SEGURIDAD</span><h2>Configuración</h2><p>Marcas, locales, almacenamiento y dispositivos conectados.</p></div><div class="view-actions">${platformOwner?'<button class="btn primary" data-action="new-brand">＋ Nueva marca</button>':''}<button class="btn" data-action="new-location">＋ Nuevo local</button></div></div><section class="panel-grid"><article class="panel"><div class="panel-head"><h3>Apariencia</h3></div><label class="field"><span>Tema</span><select id="themeSelect"><option value="system">Usar sistema</option><option value="light">Claro</option><option value="dark">Oscuro</option></select></label></article><article class="panel"><div class="panel-head"><h3>Archivo documental R2</h3></div><p style="color:var(--muted);font-size:11px;line-height:1.6">Factura original, hash, vínculo, revisión y PDF de cada folio quedan archivados para búsquedas y Dashboard.</p></article></section><div class="view-header" style="margin-top:18px"><div><span class="eyebrow">WORKSPACES</span><h2>Marcas y locales</h2></div></div><section class="cards-grid">${brands}</section><section class="table-card" style="margin-top:18px"><div class="panel-head" style="padding:16px"><h3>Sesiones</h3><small>Pueden revocarse en cualquier momento.</small></div><table class="data-table"><thead><tr><th>Usuario</th><th>Dispositivo</th><th>Creada</th><th>Último uso</th><th></th></tr></thead><tbody>${sessions.map(s=>`<tr><td>${esc(s.displayName)}${s.current?' · actual':''}</td><td>${esc((s.userAgent||'Dispositivo').slice(0,80))}</td><td>${date(s.createdAt)}</td><td>${date(s.lastSeenAt)}</td><td><button class="btn small danger" data-revoke-session="${esc(s.id)}">Revocar</button></td></tr>`).join('')}</tbody></table></section>`;
  $('#themeSelect').value=theme;$('#themeSelect').addEventListener('change',event=>setTheme(event.target.value));bindDynamic();
}

export"""
          t,count=settings_pattern.subn(settings,t,count=1)
          if count!=1: raise SystemExit('Could not replace settings')
          p.write_text(t,encoding='utf-8')
          PY
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app-order-detail.js

      - name: Run complete validation
        working-directory: professional
        run: npm run verify

      - name: Commit final owner UI and local scoping
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add professional
          git commit -m "feat(ui): add owner brands, local users and historical document search"
          git push origin HEAD:${{ github.head_ref }}
