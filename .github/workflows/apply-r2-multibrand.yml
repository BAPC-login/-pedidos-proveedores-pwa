name: Apply R2 multibrand upgrade

on:
  push:
    branches:
      - agent/r2-multibrand-owner-v1
    paths:
      - '.github/workflows/apply-r2-multibrand.yml'

permissions:
  contents: write

jobs:
  finalize-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/r2-multibrand-owner-v1
          fetch-depth: 0
      - name: Apply deterministic finalizer
        run: python scripts/finalize_r2_multibrand.py
      - name: Validate JavaScript and business rules
        run: |
          node --check professional/worker/src/api/documents.js
          node --check professional/worker/src/api/catalog.js
          node --check professional/web/app-actions.js
          node --check professional/web/app-views.js
          node --check professional/web/app-order-detail.js
          cd professional
          npm run verify
      - name: Commit final upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add professional
          git commit -m "feat(platform): finalize local-scoped history and owner workspace UI"
          git push origin HEAD:agent/r2-multibrand-owner-v1
