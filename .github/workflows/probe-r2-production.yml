name: Probe R2 production

on:
  pull_request:
    paths:
      - '.github/workflows/probe-r2-production.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verify clean release 18
        shell: bash
        run: |
          set -u
          BASE="https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
          for attempt in $(seq 1 24); do
            app_code=$(curl --silent --show-error --max-time 30 --output /tmp/app.html --write-out '%{http_code}' "$BASE/" || true)
            actions_code=$(curl --silent --show-error --max-time 30 --output /tmp/actions.js --write-out '%{http_code}' "$BASE/app-actions.js" || true)
            views_code=$(curl --silent --show-error --max-time 30 --output /tmp/views.js --write-out '%{http_code}' "$BASE/app-views.js" || true)
            ai_code=$(curl --silent --show-error --max-time 30 --output /tmp/ai.json --write-out '%{http_code}' "$BASE/health" || true)
            health_code=$(curl --silent --show-error --max-time 30 --dump-header /tmp/health.headers --output /tmp/health.json --write-out '%{http_code}' "$BASE/platform/health" || true)
            me_code=$(curl --silent --show-error --max-time 30 --output /tmp/me.json --write-out '%{http_code}' "$BASE/api/me" || true)
            invalid_code=$(curl --silent --show-error --max-time 30 --output /tmp/invalid.json --write-out '%{http_code}' -H 'Content-Type: application/json' --data '{"email":"admin@pedidospro.local","password":"incorrecta","organizationSlug":"pedidos-pro"}' "$BASE/api/auth/login" || true)
            bootstrap_code=$(curl --silent --show-error --max-time 30 --output /tmp/bootstrap.json --write-out '%{http_code}' -H 'Content-Type: application/json' --data '{"organizationName":"Blocked","locationName":"Blocked","displayName":"Blocked","email":"blocked@example.com","password":"blocked-password"}' "$BASE/api/bootstrap" || true)
            diagnostic_code=$(curl --silent --show-error --max-time 30 --output /tmp/diagnostic.json --write-out '%{http_code}' "$BASE/api/platform-diagnostics" || true)
            echo "attempt=${attempt} app=${app_code} actions=${actions_code} views=${views_code} ai=${ai_code} health=${health_code} me=${me_code} invalid=${invalid_code} bootstrap=${bootstrap_code} diagnostic=${diagnostic_code}"
            cat /tmp/health.json 2>/dev/null || true
            echo
            if [ "$app_code" = "200" ] \
              && [ "$actions_code" = "200" ] \
              && [ "$views_code" = "200" ] \
              && grep -q 'Nueva marca' /tmp/actions.js \
              && grep -q 'Locales permitidos' /tmp/actions.js \
              && grep -q 'Archivo documental persistente' /tmp/views.js \
              && [ "$ai_code" = "200" ] \
              && grep -q '"geminiConfigured":true' /tmp/ai.json \
              && [ "$health_code" = "200" ] \
              && grep -qi '^x-pedidos-pro-release: 2026.07.21.18' /tmp/health.headers \
              && grep -q '"schemaVersion":"7"' /tmp/health.json \
              && grep -q '"storageConfigured":true' /tmp/health.json \
              && grep -q '"storageBackend":"d1-chunks"' /tmp/health.json \
              && [ "$me_code" = "401" ] \
              && [ "$invalid_code" = "401" ] \
              && [ "$bootstrap_code" = "403" ] \
              && [ "$diagnostic_code" = "401" ]; then exit 0; fi
            sleep 10
          done
          exit 1
