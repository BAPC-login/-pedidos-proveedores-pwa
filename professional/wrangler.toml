name = "pedidos-pro-platform"
main = "worker/src/index.js"
compatibility_date = "2026-07-21"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./web"
binding = "ASSETS"
run_worker_first = true

[vars]
ENVIRONMENT = "staging"
AI_ENDPOINT = "https://pedidos-pro-ai.botreservasmultilocal.workers.dev"
ALLOWED_ORIGINS = "http://localhost:8787,http://127.0.0.1:8787"

[[d1_databases]]
binding = "DB"
database_name = "pedidos-pro-platform"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# Activa R2 cuando quieras guardar PDF, XML e imágenes en la nube.
# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "pedidos-pro-files"
# preview_bucket_name = "pedidos-pro-files-preview"

# Rate limiting administrado por Cloudflare. Déjalo comentado en el primer despliegue gratuito.
